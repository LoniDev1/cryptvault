name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 -> .deb (Debian/Ubuntu/Mint), .rpm (Fedora/RHEL/openSUSE), .AppImage (Arch/any distro)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
            label: linux-x86_64
          # Linux aarch64 (Raspberry Pi, ARM servers)
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,rpm,appimage
            label: linux-aarch64
          # Windows x86_64 -> NSIS .exe + MSI
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            label: windows-x86_64
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
            label: macos-aarch64
          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: app,dmg
            label: macos-x86_64
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - run: npm ci

      - name: Build & publish (${{ matrix.label }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CryptVault ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
